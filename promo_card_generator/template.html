<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - VIP Offer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(145deg, #1e1e3f 0%, #252550 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .header {
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 50%, #c026d3 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            margin-bottom: 15px;
            position: relative;
        }
        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
        }
        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-top: 10px;
            position: relative;
        }
        .content {
            padding: 30px;
        }
        .intro {
            text-align: center;
            color: #a5b4fc;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .product-card {
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.2);
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-info {
            padding: 20px;
        }
        .product-tag {
            display: inline-block;
            background: linear-gradient(90deg, #f59e0b 0%, #f97316 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .product-tag.vip {
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%);
        }
        .product-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .product-desc {
            color: #a5b4fc;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .shop-btn {
            display: inline-block;
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .shop-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
        .footer {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px 30px;
            text-align: center;
        }
        .footer p {
            color: #a5b4fc;
            font-size: 13px;
            line-height: 1.5;
        }
        .footer span {
            color: #f59e0b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">🌟 Exclusive VIP Offer</div>
            <h1>{{TITLE}}</h1>
            <p>{{SUBTITLE}}</p>
        </div>
        
        <div class="content">
            <p class="intro">{{INTRO}}</p>
            
            {{PRODUCTS}}
        </div>
        
        <div class="footer">
            <p>{{FOOTER}}</p>
        </div>
    </div>
</body>
</html>
