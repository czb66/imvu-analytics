<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/auth.js"></script>
    <script src="/static/i18n.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #52c41a;
            --danger: #ff4d4f;
            --warning: #faad14;
        }
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px 0;
            color: white;
            z-index: 1000;
            overflow-y: auto;
        }
        .sidebar h4 {
            padding: 0 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin-right: 20px;
        }
        .profile-info h4 {
            margin: 0 0 5px 0;
        }
        .profile-info p {
            margin: 0;
            color: #888;
        }
        .info-row {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 150px;
            color: #888;
            font-weight: 500;
        }
        .info-value {
            flex: 1;
            color: #333;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }
        .form-floating {
            margin-bottom: 15px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }
        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-save:disabled {
            opacity: 0.6;
            transform: none;
        }
        .btn-danger-outline {
            border: 2px solid var(--danger);
            color: var(--danger);
            background: transparent;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-danger-outline:hover {
            background: var(--danger);
            color: white;
        }
        .lang-switcher {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1001;
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .lang-btn {
            padding: 5px 12px;
            border-radius: 15px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .lang-btn:hover {
            background: #f0f0f0;
        }
        .lang-btn.active {
            background: var(--primary);
            color: white;
        }
        .alert {
            border-radius: 10px;
            padding: 15px 20px;
        }
        .alert-success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        .alert-danger {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        .device-info {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            word-break: break-all;
        }
        .token-info {
            background: #fffbe6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 语言切换器 -->
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <span style="color: #ccc;">|</span>
        <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
    </div>

    <!-- 侧边栏 -->
    <nav class="sidebar">
        <h4><i class="bi bi-graph-up"></i> {{ app_name }}</h4>
        <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="/diagnosis"><i class="bi bi-search me-2"></i><span data-i18n="nav.diagnosis">Deep Analysis</span></a>
        <a href="/compare"><i class="bi bi-bar-chart-steps me-2"></i><span data-i18n="nav.compare">Data Compare</span></a>
        <a href="/report"><i class="bi bi-file-earmark-text me-2"></i><span data-i18n="nav.report">Reports</span></a>
        <a href="/profile" class="active"><i class="bi bi-person me-2"></i><span data-i18n="profile.nav">Profile</span></a>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="header-title" style="font-size: 24px; font-weight: bold; color: #333; margin-bottom: 20px;">
            <i class="bi bi-person-circle"></i> <span data-i18n="profile.pageTitle">Profile</span>
        </div>

        <!-- 提示信息 -->
        <div id="alertMessage" class="alert d-none"></div>

        <!-- 用户信息卡片 -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <i class="bi bi-person"></i>
                </div>
                <div class="profile-info">
                    <h4 id="displayUsername">-</h4>
                    <p id="displayEmail">-</p>
                </div>
            </div>

            <div class="info-row">
                <div class="info-label"><i class="bi bi-envelope me-2"></i><span data-i18n="profile.email">Email</span></div>
                <div class="info-value" id="infoEmail">-</div>
            </div>
            <div class="info-row">
                <div class="info-label"><i class="bi bi-calendar me-2"></i><span data-i18n="profile.registrationDate">Registration Date</span></div>
                <div class="info-value" id="infoCreatedAt">-</div>
            </div>
            <div class="info-row">
                <div class="info-label"><i class="bi bi-clock-history me-2"></i><span data-i18n="profile.lastLogin">Last Login</span></div>
                <div class="info-value" id="infoLastLogin">-</div>
            </div>
            <div class="info-row">
                <div class="info-label"><i class="bi bi-laptop me-2"></i><span data-i18n="profile.loginDevice">Login Device</span></div>
                <div class="info-value">
                    <div class="device-info" id="infoDevice">Web Browser</div>
                </div>
            </div>
        </div>

        <!-- 修改用户名 -->
        <div class="profile-card">
            <div class="section-title"><i class="bi bi-pencil-square me-2"></i><span data-i18n="profile.updateUsername">Update Username</span></div>
            <form id="usernameForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="newUsername" placeholder="New Username" required minlength="2" maxlength="50">
                            <label for="newUsername" data-i18n="profile.newUsername">New Username</label>
                        </div>
                    </div>
                    <div class="col-md-6 d-flex align-items-center">
                        <button type="submit" class="btn btn-save" id="usernameBtn">
                            <span data-i18n="profile.save">Save</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- 修改密码 -->
        <div class="profile-card">
            <div class="section-title"><i class="bi bi-key me-2"></i><span data-i18n="profile.changePassword">Change Password</span></div>
            <form id="passwordForm">
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="oldPassword" placeholder="Old Password" required>
                            <label for="oldPassword" data-i18n="profile.oldPassword">Old Password</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="newPassword" placeholder="New Password" required minlength="8">
                            <label for="newPassword" data-i18n="profile.newPassword">New Password</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required minlength="8">
                            <label for="confirmPassword" data-i18n="profile.confirmPassword">Confirm Password</label>
                        </div>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-save" id="passwordBtn">
                        <span data-i18n="profile.changePassword">Change Password</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- 退出登录 -->
        <div class="profile-card">
            <div class="section-title"><i class="bi bi-box-arrow-right me-2"></i><span data-i18n="profile.sessionManagement">Session Management</span></div>
            <div class="token-info mb-3">
                <div class="d-flex align-items-center mb-2">
                    <i class="bi bi-shield-check text-success me-2"></i>
                    <strong data-i18n="profile.tokenValid">Token Valid: 7 days</strong>
                </div>
                <div class="text-muted" style="font-size: 12px;" data-i18n="profile.tokenExpireNote">Your session will expire after 7 days</div>
            </div>
            <button class="btn btn-danger-outline" onclick="logout()">
                <i class="bi bi-box-arrow-right me-2"></i><span data-i18n="profile.logout">Logout</span>
            </button>
        </div>
    </main>

    <script>
        // 翻译数据
        const translations = {
            en: {
                nav: {
                    dashboard: "Dashboard",
                    diagnosis: "Deep Analysis",
                    compare: "Data Compare",
                    report: "Reports"
                },
                profile: {
                    nav: "Profile",
                    pageTitle: "Profile",
                    email: "Email",
                    registrationDate: "Registration Date",
                    lastLogin: "Last Login",
                    loginDevice: "Login Device",
                    updateUsername: "Update Username",
                    newUsername: "New Username",
                    save: "Save",
                    changePassword: "Change Password",
                    oldPassword: "Old Password",
                    newPassword: "New Password",
                    confirmPassword: "Confirm Password",
                    sessionManagement: "Session Management",
                    tokenValid: "Token Valid: 7 days",
                    tokenExpireNote: "Your session will expire after 7 days",
                    logout: "Logout"
                },
                messages: {
                    usernameUpdated: "Username updated successfully",
                    passwordChanged: "Password changed successfully",
                    passwordMismatch: "Passwords do not match",
                    updateFailed: "Update failed"
                }
            },
            zh: {
                nav: {
                    dashboard: "仪表盘",
                    diagnosis: "深度分析",
                    compare: "数据对比",
                    report: "报告中心"
                },
                profile: {
                    nav: "个人中心",
                    pageTitle: "个人中心",
                    email: "邮箱",
                    registrationDate: "注册时间",
                    lastLogin: "最后登录",
                    loginDevice: "登录设备",
                    updateUsername: "修改用户名",
                    newUsername: "新用户名",
                    save: "保存",
                    changePassword: "修改密码",
                    oldPassword: "旧密码",
                    newPassword: "新密码",
                    confirmPassword: "确认密码",
                    sessionManagement: "会话管理",
                    tokenValid: "Token有效期：7天",
                    tokenExpireNote: "登录后将在7天后自动过期",
                    logout: "退出登录"
                },
                messages: {
                    usernameUpdated: "用户名修改成功",
                    passwordChanged: "密码修改成功",
                    passwordMismatch: "两次输入的密码不一致",
                    updateFailed: "修改失败"
                }
            }
        };

        let currentLang = localStorage.getItem('language') || 'en';

        // 页面加载时获取用户信息
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadProfile();
            setLanguage(currentLang);
        });

        // 检查登录状态
        async function checkAuth() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = '/login';
                    return false;
                }
                return true;
            } catch (error) {
                window.location.href = '/login';
                return false;
            }
        }

        // 加载用户信息
        async function loadProfile() {
            try {
                const token = localStorage.getItem('access_token');
                const res = await fetch('/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    const user = data.data;
                    document.getElementById('displayUsername').textContent = user.username || 'User';
                    document.getElementById('displayEmail').textContent = user.email;
                    document.getElementById('infoEmail').textContent = user.email;
                    document.getElementById('infoCreatedAt').textContent = formatDate(user.created_at);
                    document.getElementById('infoLastLogin').textContent = formatDate(user.last_login) || (currentLang === 'zh' ? '首次登录' : 'First login');
                    document.getElementById('newUsername').value = user.username || '';
                }
            } catch (error) {
                showAlert('danger', currentLang === 'zh' ? '加载用户信息失败' : 'Failed to load profile');
            }
        }

        // 修改用户名
        document.getElementById('usernameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newUsername = document.getElementById('newUsername').value;
            const btn = document.getElementById('usernameBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>...';
            
            try {
                const token = localStorage.getItem('access_token');
                const res = await fetch('/api/auth/username', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username: newUsername })
                });
                
                const data = await res.json();
                if (data.success) {
                    showAlert('success', translations[currentLang].messages.usernameUpdated);
                    document.getElementById('displayUsername').textContent = newUsername;
                } else {
                    showAlert('danger', data.message);
                }
            } catch (error) {
                showAlert('danger', translations[currentLang].messages.updateFailed);
            }
            
            btn.disabled = false;
            btn.innerHTML = translations[currentLang].profile.save;
        });

        // 修改密码
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('passwordBtn');
            
            if (newPassword !== confirmPassword) {
                showAlert('danger', translations[currentLang].messages.passwordMismatch);
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>...';
            
            try {
                const token = localStorage.getItem('access_token');
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
                });
                
                const data = await res.json();
                if (data.success) {
                    showAlert('success', translations[currentLang].messages.passwordChanged);
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showAlert('danger', data.message);
                }
            } catch (error) {
                showAlert('danger', translations[currentLang].messages.updateFailed);
            }
            
            btn.disabled = false;
            btn.innerHTML = translations[currentLang].profile.changePassword;
        });

        // 退出登录
        async function logout() {
            try {
                const token = localStorage.getItem('access_token');
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (e) {}
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // 显示提示
        function showAlert(type, message) {
            const alert = document.getElementById('alertMessage');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
            alert.classList.remove('d-none');
            setTimeout(() => alert.classList.add('d-none'), 5000);
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            return date.toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 设置语言
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            
            // 更新按钮状态
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            // 应用翻译
            applyTranslations();
        }

        // 应用翻译
        function applyTranslations() {
            const t = translations[currentLang];
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const keys = key.split('.');
                let value = t;
                for (const k of keys) {
                    value = value?.[k];
                }
                if (value) {
                    el.textContent = value;
                }
            });
        }
    </script>
</body>
</html>
