<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.2.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #52c41a;
            --danger: #ff4d4f;
            --warning: #faad14;
        }
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px 0;
            color: white;
        }
        .sidebar h4 {
            padding: 0 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .metric-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.3s;
        }
        .metric-card:hover {
            transform: translateY(-2px);
        }
        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        .metric-label {
            color: #888;
            font-size: 14px;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            height: 320px;
            display: flex;
            flex-direction: column;
        }
        .chart-container canvas {
            max-height: 260px;
        }
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 错误状态 */
        .error-retry-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        .error-retry-btn:hover {
            background: var(--secondary);
        }
        /* 图表加载状态 */
        .chart-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #999;
        }
        /* 产品表格区域 */
        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }
        .chart-container canvas {
            max-height: 300px !important;
            width: 100% !important;
        }
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .retry-btn {
            margin-top: 10px;
        }
        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: #f8f9ff;
        }
        .upload-zone.dragover {
            border-color: var(--primary);
            background: #e6efff;
        }
        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <h4><i class="bi bi-graph-up"></i> {{ app_name }}</h4>
        <a href="/dashboard" class="active"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a>
        <a href="/diagnosis"><i class="bi bi-search me-2"></i>深度诊断</a>
        <a href="/report"><i class="bi bi-file-earmark-text me-2"></i>报告中心</a>
    </nav>

    <!-- 加载状态 -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p style="margin-top: 20px; color: #666;">正在加载数据...</p>
    </div>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="header-title">📊 数据概览</div>
        
        <!-- 上传区域 -->
        <div class="upload-zone mb-4" id="uploadZone">
            <i class="bi bi-cloud-upload fs-1 text-primary"></i>
            <h5 class="mt-3">上传XML数据文件</h5>
            <p class="text-muted">拖拽文件到此处或点击选择</p>
            <input type="file" id="fileInput" accept=".xml" style="display: none;">
            <button class="btn btn-primary mt-2" onclick="document.getElementById('fileInput').click()">
                <i class="bi bi-upload"></i> 选择文件
            </button>
            <a href="/api/upload/template" class="btn btn-outline-secondary mt-2 ms-2" download>
                <i class="bi bi-download"></i> 下载模板
            </a>
        </div>
        
        <!-- 上传状态 -->
        <div id="uploadStatus" class="alert d-none mb-4"></div>

        <!-- 核心指标 -->
        <div class="row g-4 mb-4" id="metricsContainer">
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" id="directSales">-</div>
                    <div class="metric-label"><i class="bi bi-cart-check"></i> 直接销售</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" id="indirectSales">-</div>
                    <div class="metric-label"><i class="bi bi-cart-plus"></i> 间接销售</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" id="promotedSales">-</div>
                    <div class="metric-label"><i class="bi bi-megaphone"></i> 推广销售</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" style="color: var(--primary);" id="totalSales">-</div>
                    <div class="metric-label"><i class="bi bi-bag-check"></i> 总销售数量</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" style="color: var(--success);" id="totalProfit">-</div>
                    <div class="metric-label"><i class="bi bi-wallet2"></i> 总利润 (Credits)</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" style="color: var(--success);" id="totalProfitUsd">-</div>
                    <div class="metric-label"><i class="bi bi-currency-dollar"></i> 总利润 (USD)</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" style="color: var(--success);" id="visibleProducts">-</div>
                    <div class="metric-label"><i class="bi bi-eye"></i> 可见产品</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" style="color: var(--danger);" id="hiddenProducts">-</div>
                    <div class="metric-label"><i class="bi bi-eye-slash"></i> 隐藏产品</div>
                </div>
            </div>
            <div class="col-md-4 col-lg-3">
                <div class="metric-card">
                    <div class="metric-value" id="totalProducts">-</div>
                    <div class="metric-label"><i class="bi bi-box"></i> 总产品数</div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="bi bi-bar-chart"></i> Top 10 产品（销量）</h5>
                    <canvas id="topProductsChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="bi bi-pie-chart"></i> 可见性分布</h5>
                    <canvas id="visibilityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="bi bi-globe"></i> 流量对比</h5>
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-container">
                    <h5 class="mb-3"><i class="bi bi-currency-exchange"></i> 价格区间分布</h5>
                    <canvas id="priceRangeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 产品表格 -->
        <div class="chart-container">
            <h5 class="mb-3"><i class="bi bi-table"></i> 产品列表</h5>
            <div class="mb-3">
                <input type="text" class="form-control" id="searchInput" placeholder="搜索产品ID或名称...">
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>产品ID</th>
                            <th>产品名称</th>
                            <th>价格</th>
                            <th>利润</th>
                            <th>利润率</th>
                            <th>可见性</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 全局图表实例
        let topProductsChart, visibilityChart, trafficChart, priceRangeChart;
        
        // 配置
        const CONFIG = {
            FETCH_TIMEOUT: 10000,  // 10秒超时
            MAX_RETRIES: 3,        // 最大重试次数
            RETRY_DELAY: 2000       // 重试延迟（毫秒）
        };

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            setupUploadZone();
            setupSearch();
            loadDashboardData();
        });

        // 带超时的fetch
        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.FETCH_TIMEOUT);
            
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时，请检查网络连接');
                }
                throw error;
            }
        }

        // 带重试的fetch
        async function fetchWithRetry(url, options = {}, retries = CONFIG.MAX_RETRIES) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetchWithTimeout(url, options);
                    return response;
                } catch (error) {
                    console.warn(`请求失败 (${i + 1}/${retries}):`, error.message);
                    if (i < retries - 1) {
                        await new Promise(resolve => setTimeout(resolve, CONFIG.RETRY_DELAY));
                    } else {
                        throw error;
                    }
                }
            }
        }

        // 显示/隐藏加载状态
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // 显示错误状态
        function showError(message) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.innerHTML = `
                <i class="bi bi-exclamation-triangle" style="font-size: 48px; color: #ff4d4f;"></i>
                <p style="margin-top: 20px; color: #666;">${message}</p>
                <button class="error-retry-btn" onclick="retryLoad()">
                    <i class="bi bi-arrow-clockwise"></i> 重试
                </button>
            `;
            overlay.style.display = 'flex';
        }

        // 重试加载
        function retryLoad() {
            hideLoading();
            document.getElementById('loadingOverlay').innerHTML = `
                <div class="loading-spinner"></div>
                <p style="margin-top: 20px; color: #666;">正在加载数据...</p>
            `;
            loadDashboardData();
        }

        // 加载仪表盘数据
        async function loadDashboardData() {
            showLoading();
            
            try {
                // 优先加载核心指标（最重要的数据）
                const summaryRes = await fetchWithRetry('/api/dashboard/summary');
                const summaryData = await summaryRes.json();
                
                if (summaryData.success) {
                    const s = summaryData.data;
                    document.getElementById('directSales').textContent = formatNumber(s.direct_sales) + ' 个';
                    document.getElementById('indirectSales').textContent = formatNumber(s.indirect_sales) + ' 个';
                    document.getElementById('promotedSales').textContent = formatNumber(s.promoted_sales) + ' 个';
                    document.getElementById('totalSales').textContent = formatNumber(s.total_sales) + ' 个';
                    document.getElementById('totalProfit').textContent = formatNumber(s.total_profit);
                    document.getElementById('totalProfitUsd').textContent = '$' + formatNumber(s.total_profit_usd);
                    document.getElementById('visibleProducts').textContent = s.visible_products;
                    document.getElementById('hiddenProducts').textContent = s.hidden_products;
                    document.getElementById('totalProducts').textContent = s.total_products;
                }

                // 并行加载其他图表数据（提高性能）
                const [topRes, visRes, trafficRes, priceRes] = await Promise.all([
                    fetchWithRetry('/api/dashboard/top-products?limit=10&metric=sales'),
                    fetchWithRetry('/api/dashboard/visibility'),
                    fetchWithRetry('/api/dashboard/traffic'),
                    fetchWithRetry('/api/diagnosis/price-range').catch(() => ({ json: async () => ({ success: true, data: [] }) }))
                ]);

                const topData = await topRes.json();
                const visData = await visRes.json();
                const trafficData = await trafficRes.json();
                const priceData = await priceRes.json();

                if (topData.success) {
                    updateTopProductsChart(topData.data);
                    updateProductsTable(topData.data);
                }

                if (visData.success) {
                    updateVisibilityChart(visData.data);
                }

                if (trafficData.success) {
                    updateTrafficChart(trafficData.data);
                }

                if (priceData.success) {
                    updatePriceRangeChart(priceData.data);
                }

                hideLoading();

            } catch (error) {
                console.error('加载数据失败:', error);
                showError(error.message || '加载数据失败，请稍后重试');
            }
        }

        // 初始化图表
        function initCharts() {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            };

            topProductsChart = new Chart(document.getElementById('topProductsChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: '销量', data: [], backgroundColor: '#667eea' }] },
                options: { ...chartOptions }
            });

            visibilityChart = new Chart(document.getElementById('visibilityChart'), {
                type: 'doughnut',
                data: { labels: ['可见', '隐藏'], datasets: [{ data: [0, 0], backgroundColor: ['#52c41a', '#ff4d4f'] }] },
                options: chartOptions
            });

            trafficChart = new Chart(document.getElementById('trafficChart'), {
                type: 'pie',
                data: { labels: ['自然流量', '付费流量'], datasets: [{ data: [0, 0], backgroundColor: ['#667eea', '#764ba2'] }] },
                options: chartOptions
            });

            priceRangeChart = new Chart(document.getElementById('priceRangeChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: '产品数量', data: [], backgroundColor: '#faad14' }] },
                options: chartOptions
            });
        }

        function updateTopProductsChart(products) {
            topProductsChart.data.labels = products.map(p => (p.product_name || 'N/A').substring(0, 15));
            const salesData = products.map(p => (p.direct_sales || 0) + (p.indirect_sales || 0) + (p.promoted_sales || 0));
            topProductsChart.data.datasets[0].data = salesData;
            topProductsChart.data.datasets[0].label = '销量 (个)';
            topProductsChart.update();
        }

        function updateVisibilityChart(data) {
            visibilityChart.data.datasets[0].data = [data.visible?.count || 0, data.hidden?.count || 0];
            visibilityChart.update();
        }

        function updateTrafficChart(data) {
            trafficChart.data.datasets[0].data = [
                data.organic?.total_impressions || 0,
                data.paid?.total_impressions || 0
            ];
            trafficChart.update();
        }

        function updatePriceRangeChart(data) {
            if (!data || data.length === 0) {
                priceRangeChart.data.labels = ['暂无数据'];
                priceRangeChart.data.datasets[0].data = [0];
            } else {
                priceRangeChart.data.labels = data.map(d => d.range);
                priceRangeChart.data.datasets[0].data = data.map(d => d.count);
            }
            priceRangeChart.update();
        }

        function updateProductsTable(products) {
            const tbody = document.getElementById('productsTable');
            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => {
                const profitRate = p.price > 0 ? (p.profit / p.price * 100).toFixed(1) : 0;
                return `
                    <tr>
                        <td>${p.product_id || '-'}</td>
                        <td>${(p.product_name || 'N/A').substring(0, 30)}${(p.product_name || '').length > 30 ? '...' : ''}</td>
                        <td>${formatNumber(p.price)} c</td>
                        <td>${formatNumber(p.profit)} c</td>
                        <td>${profitRate}%</td>
                        <td>${p.visible === 'Y' ? '<span class="badge bg-success">可见</span>' : '<span class="badge bg-danger">隐藏</span>'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 文件上传
        function setupUploadZone() {
            const zone = document.getElementById('uploadZone');
            const input = document.getElementById('fileInput');
            const status = document.getElementById('uploadStatus');

            zone.addEventListener('dragover', e => {
                e.preventDefault();
                zone.classList.add('dragover');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('dragover');
            });

            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) uploadFile(file);
            });

            input.addEventListener('change', e => {
                const file = e.target.files[0];
                if (file) uploadFile(file);
            });
        }

        async function uploadFile(file) {
            const status = document.getElementById('uploadStatus');
            status.className = 'alert alert-info';
            status.textContent = '正在上传和解析...';
            status.classList.remove('d-none');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload/', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    status.className = 'alert alert-success';
                    status.innerHTML = `<i class="bi bi-check-circle"></i> ${data.message}`;
                    loadDashboardData();
                } else {
                    status.className = 'alert alert-danger';
                    status.textContent = data.detail || '上传失败';
                }
            } catch (error) {
                status.className = 'alert alert-danger';
                status.textContent = '上传出错: ' + error.message;
            }

            setTimeout(() => status.classList.add('d-none'), 5000);
        }

        // 搜索功能
        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', async e => {
                const query = e.target.value.trim();
                if (query.length < 2) {
                    loadDashboardData();
                    return;
                }
                
                try {
                    const res = await fetch(`/api/dashboard/products?limit=50`);
                    const data = await res.json();
                    if (data.success) {
                        const filtered = data.data.products.filter(p => 
                            p.product_id.includes(query) || 
                            (p.product_name && p.product_name.includes(query))
                        );
                        updateProductsTable(filtered);
                    }
                } catch (error) {
                    console.error('搜索失败:', error);
                }
            });
        }

        // 格式化数字
        function formatNumber(num) {
            if (num === undefined || num === null) return '-';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toFixed(2);
        }
    </script>
</body>
</html>
