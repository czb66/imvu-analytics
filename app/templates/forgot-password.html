<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="forgot_password_title">忘记密码 - IMVU Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            color: white;
            width: 100%;
        }
        .btn-submit:hover {
            opacity: 0.9;
            color: white;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrapper i {
            font-size: 36px;
            color: white;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .lang-switch button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button onclick="switchLanguage('en')">English</button>
        <button onclick="switchLanguage('zh')">中文</button>
    </div>
    
    <div class="container-wrapper">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="bi bi-key"></i>
                </div>
                <h1 data-i18n="forgot_password">忘记密码</h1>
                <p data-i18n="forgot_password_desc">输入您的注册邮箱，我们将发送密码重置链接</p>
            </div>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
            <div id="successBox" class="alert alert-success d-none" role="alert"></div>
            
            <form id="forgotForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email" data-i18n="email">邮箱</label>
                </div>
                
                <button type="submit" class="btn btn-submit btn-lg" id="submitBtn">
                    <span data-i18n="send_reset_link">发送重置链接</span>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/login" data-i18n="back_to_login">返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 多语言支持
        const translations = {
            en: {
                forgot_password_title: 'Forgot Password - IMVU Analytics',
                forgot_password: 'Forgot Password',
                forgot_password_desc: 'Enter your registered email, we will send a password reset link',
                email: 'Email',
                send_reset_link: 'Send Reset Link',
                back_to_login: 'Back to Login',
                invalid_email: 'Please enter a valid email address',
                email_required: 'Email is required',
                sending: 'Sending...',
                send_success: 'If this email is registered, a reset link has been sent. Please check your spam folder.',
                send_error: 'Failed to send email. Please try again later.'
            },
            zh: {
                forgot_password_title: '忘记密码 - IMVU Analytics',
                forgot_password: '忘记密码',
                forgot_password_desc: '输入您的注册邮箱，我们将发送密码重置链接',
                email: '邮箱',
                send_reset_link: '发送重置链接',
                back_to_login: '返回登录',
                invalid_email: '请输入有效的邮箱地址',
                email_required: '请输入邮箱',
                sending: '发送中...',
                send_success: '如果该邮箱已注册，重置链接已发送至您的邮箱，请检查垃圾邮件文件夹。',
                send_error: '邮件发送失败，请稍后重试。'
            }
        };

        let currentLang = 'zh';

        function switchLanguage(lang) {
            currentLang = lang;
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            
            // 更新HTML lang属性
            document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        }

        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            const successBox = document.getElementById('successBox');
            
            alertBox.classList.add('d-none');
            successBox.classList.add('d-none');
            
            if (isSuccess) {
                successBox.textContent = message;
                successBox.classList.remove('d-none');
            } else {
                alertBox.textContent = message;
                alertBox.classList.remove('d-none');
            }
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证邮箱
            if (!email) {
                showAlert(translations[currentLang].email_required);
                return;
            }
            
            if (!validateEmail(email)) {
                showAlert(translations[currentLang].invalid_email);
                return;
            }
            
            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${translations[currentLang].sending}`;
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(data.message || translations[currentLang].send_success, true);
                    document.getElementById('forgotForm').reset();
                } else {
                    showAlert(data.message || translations[currentLang].send_error);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(translations[currentLang].send_error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = translations[currentLang].send_reset_link;
            }
        });

        // 初始化语言
        switchLanguage(currentLang);
    </script>
</body>
</html>
