<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">Register - IMVU Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/auth.js"></script>
    <script src="/static/i18n.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }
        .form-floating {
            margin-bottom: 15px;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }
        .password-wrapper {
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active, .lang-btn:hover {
            background: white;
            color: var(--primary);
        }
        .email-check-indicator {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        .email-check-indicator.checking { color: #999; }
        .email-check-indicator.available { color: #28a745; }
        .email-check-indicator.taken { color: #dc3545; }
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: 5px;
            background: #e0e0e0;
            overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%;
            transition: all 0.3s;
        }
        .strength-text {
            font-size: 0.8rem;
            margin-top: 3px;
        }
        .password-requirements {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- 语言切换 -->
    <div class="lang-switcher">
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
    </div>

    <div class="register-card">
        <div class="logo">
            <i class="bi bi-person-plus-fill"></i>
            <h1 data-i18n="appName">IMVU Analytics</h1>
            <p class="text-muted" data-i18n="register_subtitle">Create your account</p>
        </div>

        <!-- 提示框 -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="registerForm">
            <!-- 邮箱 -->
            <div class="form-floating" style="position: relative;">
                <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
                <label for="email" data-i18n="email">Email</label>
                <span class="email-check-indicator" id="emailCheckIndicator"></span>
                <div class="invalid-feedback" id="emailError"></div>
            </div>

            <!-- 用户名 -->
            <div class="form-floating">
                <input type="text" class="form-control" id="username" placeholder="Username">
                <label for="username" data-i18n="username">Username (optional)</label>
            </div>

            <!-- 密码 -->
            <div class="form-floating password-wrapper">
                <input type="password" class="form-control" id="password" placeholder="Password" required minlength="8">
                <label for="password" data-i18n="password">Password</label>
                <span class="password-toggle" onclick="togglePassword('password', 'eyeIcon1')">
                    <i class="bi bi-eye" id="eyeIcon1"></i>
                </span>
            </div>
            <div class="strength-bar" id="strengthBar">
                <div class="strength-bar-fill" id="strengthBarFill"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>

            <!-- 确认密码 -->
            <div class="form-floating password-wrapper">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                <label for="confirmPassword" data-i18n="confirm_password">Confirm Password</label>
                <span class="password-toggle" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                    <i class="bi bi-eye" id="eyeIcon2"></i>
                </span>
                <div class="invalid-feedback" id="confirmError"></div>
            </div>

            <p class="password-requirements" data-i18n="password_req">Password must be at least 8 characters</p>

            <button type="submit" class="btn btn-primary btn-register" id="submitBtn">
                <span data-i18n="register_btn">Register</span>
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted" data-i18n="has_account">Already have an account?</span>
            <a href="/login" class="text-decoration-none" data-i18n="login_link">Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 多语言
        const translations = {
            en: {
                appName: 'IMVU Analytics',
                register_subtitle: 'Create your account',
                email: 'Email',
                username: 'Username (optional)',
                password: 'Password',
                confirm_password: 'Confirm Password',
                password_req: 'Password must be at least 8 characters',
                register_btn: 'Register',
                has_account: 'Already have an account? ',
                login_link: 'Login',
                register_success: 'Registration successful! Redirecting to login...',
                register_error: 'Registration failed. Please try again.',
                email_used: 'This email is already registered',
                invalid_email: 'Please enter a valid email address',
                password_mismatch: 'Passwords do not match',
                password_short: 'Password must be at least 8 characters',
                weak: 'Weak',
                medium: 'Medium',
                strong: 'Strong',
                checking: 'Checking...',
                available: 'Available',
                server_error: 'Server error, please try again later',
                network_error: 'Network error, please check your connection'
            },
            zh: {
                appName: 'IMVU Analytics',
                register_subtitle: '创建您的账户',
                email: '邮箱',
                username: '用户名（可选）',
                password: '密码',
                confirm_password: '确认密码',
                password_req: '密码至少8位',
                register_btn: '注册',
                has_account: '已有账号？',
                login_link: '立即登录',
                register_success: '注册成功！正在跳转到登录页...',
                register_error: '注册失败，请重试。',
                email_used: '该邮箱已被注册',
                invalid_email: '请输入有效的邮箱地址',
                password_mismatch: '两次输入的密码不一致',
                password_short: '密码至少需要8个字符',
                weak: '弱',
                medium: '中等',
                strong: '强',
                checking: '检查中...',
                available: '可用',
                server_error: '服务器错误，请稍后重试',
                network_error: '网络连接失败，请检查您的网络'
            }
        };

        let currentLang = localStorage.getItem('language') || 'zh';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${isSuccess ? 'success' : 'danger'}`;
            alertBox.innerHTML = `<i class="bi bi-${isSuccess ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
            alertBox.classList.remove('d-none');
            
            if (isSuccess) {
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            return strength;
        }

        function updateStrengthBar(password) {
            const strength = checkPasswordStrength(password);
            const fill = document.getElementById('strengthBarFill');
            const text = document.getElementById('strengthText');
            
            const levels = [
                { width: '0%', color: '#e0e0e0', text: '' },
                { width: '20%', color: '#dc3545', text: t('weak') },
                { width: '40%', color: '#ffc107', text: t('weak') },
                { width: '60%', color: '#ffc107', text: t('medium') },
                { width: '80%', color: '#28a745', text: t('medium') },
                { width: '100%', color: '#28a745', text: t('strong') }
            ];
            
            const level = levels[strength];
            fill.style.width = level.width;
            fill.style.background = level.color;
            text.textContent = level.text;
            text.style.color = level.color;
        }

        // 邮箱验证
        let emailCheckTimeout;
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('emailCheckIndicator').innerHTML = '';
            this.classList.remove('is-invalid');
            clearTimeout(emailCheckTimeout);
        });

        document.getElementById('email').addEventListener('blur', async function() {
            const email = this.value.trim();
            if (!email) return;
            
            clearTimeout(emailCheckTimeout);
            emailCheckTimeout = setTimeout(async () => {
                const indicator = document.getElementById('emailCheckIndicator');
                indicator.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
                indicator.className = 'email-check-indicator checking';
                
                try {
                    const response = await fetch('/api/auth/check-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await response.json();
                    
                    if (data.exists) {
                        indicator.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
                        indicator.className = 'email-check-indicator taken';
                        this.classList.add('is-invalid');
                        document.getElementById('emailError').textContent = t('email_used');
                    } else {
                        indicator.innerHTML = '<i class="bi bi-check-circle-fill"></i>';
                        indicator.className = 'email-check-indicator available';
                        this.classList.remove('is-invalid');
                    }
                } catch (e) {
                    indicator.innerHTML = '';
                }
            }, 500);
        });

        // 密码强度
        document.getElementById('password').addEventListener('input', function() {
            updateStrengthBar(this.value);
        });

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证
            if (!email) {
                showAlert(t('invalid_email'));
                return;
            }
            if (password.length < 8) {
                showAlert(t('password_short'));
                return;
            }
            if (password !== confirmPassword) {
                showAlert(t('password_mismatch'));
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + (currentLang === 'zh' ? '注册中...' : 'Registering...');
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        username: username || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showAlert(t('register_success'), true);
                } else {
                    showAlert(data.message || t('register_error'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span data-i18n="register_btn">${t('register_btn')}</span>`;
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert(t('network_error'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span data-i18n="register_btn">${t('register_btn')}</span>`;
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
            
            // 检查是否已登录
            const token = localStorage.getItem('access_token');
            if (token) {
                fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(res => res.json()).then(data => {
                    if (data.success) window.location.href = '/dashboard';
                }).catch(() => {});
            }
        });
    </script>
</body>
</html>
