<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <!-- SEO Meta Tags -->
    <title>{% if page_title %}{{ page_title }}{% else %}IMVU Analytics{% endif %}</title>
    <meta name="description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台 - 专业的IMVU产品销售数据追踪、分析和报告工具{% endif %}">
    <meta name="keywords" content="{% if meta_keywords %}{{ meta_keywords }}{% else %}IMVU,数据分析,营销,销售报告{% endif %}">
    <meta name="robots" content="index, follow">
    <meta name="author" content="IMVU Analytics">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page_title %}{{ page_title }}{% else %}IMVU Analytics{% endif %}">
    <meta property="og:description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}">
    <meta property="og:url" content="{% if canonical_url %}{{ canonical_url }}{% else %}https://imvu-analytics-production.up.railway.app{% endif %}">
    <meta property="og:site_name" content="IMVU Analytics">
    <meta property="og:locale" content="zh_CN">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page_title %}{{ page_title }}{% else %}IMVU Analytics{% endif %}">
    <meta name="twitter:description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}">
    <meta name="twitter:site" content="@IMVUAnalytics">
    <!-- Canonical -->
    <link rel="canonical" href="{% if canonical_url %}{{ canonical_url }}{% else %}https://imvu-analytics-production.up.railway.app{% endif %}">
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "{% if page_title %}{{ page_title }}{% else %}IMVU Analytics{% endif %}",
        "description": "{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}",
        "url": "{% if canonical_url %}{{ canonical_url }}{% else %}https://imvu-analytics-production.up.railway.app{% endif %}",
        "inLanguage": "zh-CN"
    }
    </script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }}{% else %}Upload Data - {{ app_name }}{% endif %}</title>
    <meta name="description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}">
    <meta name="keywords" content="{% if meta_keywords %}{{ meta_keywords }}{% else %}IMVU,数据分析,营销,销售报告{% endif %}">
    <meta name="robots" content="index, follow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/auth.js"></script>
    <script src="/static/i18n.js?v=20260413g"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px 0;
            color: white;
            z-index: 1000;
            overflow-y: auto;
        }
        .sidebar h4 {
            padding: 0 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .upload-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .upload-zone {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-zone i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .lang-switcher {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1001;
        }
        .user-info {
            position: fixed;
            top: 15px;
            right: 150px;
            z-index: 1001;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="lang-switcher">
        <button class="btn btn-sm btn-light lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="btn btn-sm btn-light lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
    </div>
    
    <div class="user-info" id="userInfo">
        <i class="bi bi-person-circle"></i>
        <span id="userEmail"></span>
    </div>

    <div class="sidebar">
        <h4><i class="bi bi-graph-up"></i> {{ app_name }}</h4>
        <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="/upload" class="active"><i class="bi bi-cloud-upload me-2"></i><span data-i18n="nav.upload">Upload</span></a>
        <a href="/diagnosis"><i class="bi bi-search-heart me-2"></i><span data-i18n="nav.diagnosis">Diagnosis</span></a>
        <a href="/compare"><i class="bi bi-bar-chart me-2"></i><span data-i18n="nav.compare">Compare</span></a>
        <a href="/report"><i class="bi bi-file-earmark-text me-2"></i><span data-i18n="nav.report">Report</span></a>
        <a href="/insights"><i class="bi bi-lightbulb me-2"></i><span data-i18n="nav.insights">AI Insights</span></a>
        <a href="/settings"><i class="bi bi-gear me-2"></i><span data-i18n="nav.settings">Settings</span></a>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a href="#" onclick="logout(); return false;"><i class="bi bi-box-arrow-right me-2"></i><span data-i18n="nav.logout">Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <h2 class="mb-4"><i class="bi bi-cloud-upload me-2"></i><span data-i18n="dashboard.uploadTitle">Upload Data</span></h2>
        
        <div class="upload-card">
            <div class="upload-zone" id="uploadZone">
                <i class="bi bi-cloud-arrow-up"></i>
                <h4 data-i18n="dashboard.uploadHint">Drag & drop XML file here</h4>
                <p class="text-muted" data-i18n="dashboard.selectFile">or click to select file</p>
                <input type="file" id="fileInput" accept=".xml" style="display: none;">
            </div>
            
            <div id="uploadStatus" class="mt-4" style="display: none;">
                <div class="d-flex align-items-center">
                    <div class="spinner-border text-primary me-3" role="status"></div>
                    <div>
                        <strong id="uploadFileName"></strong>
                        <p class="mb-0 text-muted" id="uploadProgress"></p>
                    </div>
                </div>
            </div>

            <div id="uploadResult" class="mt-4" style="display: none;">
                <div class="alert" role="alert"></div>
            </div>

            <div class="mt-4">
                <h5 data-i18n="upload.dataFormat">Data Format Requirements</h5>
                <ul class="text-muted">
                    <li data-i18n="upload.formatXml">XML format file</li>
                    <li data-i18n="upload.maxSize">Maximum file size: 50MB</li>
                    <li data-i18n="upload.requiredFields">Required fields: Product Id, Product Name, Wholesale Price, Profit</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Page protection
        document.addEventListener('DOMContentLoaded', async function() {
            const user = await protectPage();
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
            }
        });

        // File upload handling
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.xml')) {
                showResult(false, t('upload.invalidFormat') || 'Please upload an XML file.');
                return;
            }

            const statusDiv = document.getElementById('uploadStatus');
            const resultDiv = document.getElementById('uploadResult');
            const lang = getCurrentLanguage();

            statusDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            document.getElementById('uploadFileName').textContent = file.name;
            document.getElementById('uploadProgress').textContent = t('dashboard.uploading');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await apiRequest('/api/upload/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                statusDiv.style.display = 'none';
                resultDiv.style.display = 'block';

                if (data.success) {
                    showResult(true, t('dashboard.uploadSuccess') + ` ${data.total} records imported.`);
                } else {
                    showResult(false, data.message || t('dashboard.uploadFailed'));
                }
            } catch (error) {
                console.error('Upload error:', error);
                statusDiv.style.display = 'none';
                resultDiv.style.display = 'block';
                showResult(false, t('dashboard.uploadFailed'));
            }
        }

        function showResult(success, message) {
            const resultDiv = document.getElementById('uploadResult');
            const alert = resultDiv.querySelector('.alert');
            alert.className = 'alert ' + (success ? 'alert-success' : 'alert-danger');
            alert.textContent = message;
        }
    </script>
</body>
</html>
