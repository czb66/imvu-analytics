        // 应用翻译
        function applyTranslations() {
            var currentLang = getCurrentLang();
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            
            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {

                var text = t(key);
                if (text && text !== key) {
                    el.textContent = text;
                }

            // 更新页面标题
            document.title = currentLang === 'zh' ? 'IMVU 产品推广卡片生成器' : 'IMVU Product Promo Card Generator';

        var products = [
            {
                tag: 'Top Seller AP',

            var html = '';

                html += '<div class="product-item">';

                html += '</div>';
                html += '<div class="form-row"><label>' + t('nav.promoTool.tag') + '</label><input type="text" value="' + p.tag + '" onchange="updateProduct(' + i + ', \'tag\', this.value)"></div>';
                html += '<div class="form-row"><label>' + t('nav.promoTool.tagType') + '</label><select class="transparent-select" style="width:100%;" onchange="updateProduct(' + i + ', \'tagType\', this.value)"><option value="normal"' + (p.tagType === 'normal' ? ' selected' : '') + '>' + t('nav.promoTool.tagNormal') + '</option><option value="vip"' + (p.tagType === 'vip' ? ' selected' : '') + '>' + t('nav.promoTool.tagVip') + '</option></select></div>';

                html += '</div>';
            }
            productsListEl.innerHTML = html;
        }

        function addProduct() {
            products.push({
                tag: 'New Product',
                tagType: 'normal',
                name: 'Product Name',
                description: 'Product description.',
                image: 'https://userimages01-akm.imvu.com/productdata/images_467847cdc3306eee569ff29bb5b46493.gif',
                link: 'https://www.imvu.com/shop/product.php?products_id=XXX'
            });
            renderProductsList();
            updatePreview();
        }

        function removeProduct(index) {
            products.splice(index, 1);
            renderProductsList();
            updatePreview();
        }

        function updateProduct(index, field, value) {
            products[index][field] = value;
            updatePreview();
        }

        function getProductCardHTML(p, style, color) {
            var tagClass = p.tagType === 'vip' ? ' vip' : '';
            
            if (style === 'grid') {
                return '<div class="product-card"><div class="img-container"><img src="' + p.image + '" alt="' + p.name + '"></div><div class="info"><span class="tag' + tagClass + '">' + p.tag + '</span><h4>' + p.name + '</h4><p>' + p.description + '</p><a href="' + p.link + '" class="shop-btn" target="_blank">Shop Now →</a></div></div>';
            } else if (style === 'list') {
                return '<div class="product-card"><div class="img-container"><img src="' + p.image + '" alt="' + p.name + '"></div><div class="info"><div class="info-left"><span class="tag' + tagClass + '">' + p.tag + '</span><h4>' + p.name + '</h4><p>' + p.description + '</p></div><a href="' + p.link + '" class="shop-btn" target="_blank">Shop Now →</a></div></div>';

                return '<div class="product-card"><div class="img-container"><img src="' + p.image + '" alt="' + p.name + '"></div><div class="info"><span class="tag' + tagClass + '">' + p.tag + '</span><h4>' + p.name + '</h4><p>' + p.description + '</p><a href="' + p.link + '" class="shop-btn" target="_blank">Shop Now →</a></div></div>';

                return '<div class="product-card"><div class="img-container"><img src="' + p.image + '" alt="' + p.name + '"></div><div class="info"><span class="tag' + tagClass + '">' + p.tag + '</span><h4>' + p.name + '</h4><a href="' + p.link + '" class="shop-btn" target="_blank">Buy</a></div></div>';
            } else if (style === 'featured') {
                return '<div class="product-card"><div class="img-container"><img src="' + p.image + '" alt="' + p.name + '"></div><div class="info"><span class="tag' + tagClass + '">' + p.tag + '</span><h4>' + p.name + '</h4><p>' + p.description + '</p><a href="' + p.link + '" class="shop-btn" target="_blank">Shop Now →</a></div></div>';
            }

        function getProductsHTML(style, color) {
            var html = '';

                var p = products[i];
                var tagClass = p.tagType === 'vip' ? ' vip' : '';
                html += '            <div class="product">\n';
                html += '                <div class="img"><img src="' + escapeHtml(p.image) + '" alt="' + escapeHtml(p.name) + '"></div>\n';
                html += '                <div class="info">\n';
                if (style === 'list') {
                    html += '                    <div class="info-left">\n';
                    html += '                        <span class="tag' + tagClass + '">' + escapeHtml(p.tag) + '</span>\n';
                    html += '                        <h3>' + escapeHtml(p.name) + '</h3>\n';
                    html += '                        <p>' + escapeHtml(p.description) + '</p>\n';
                    html += '                    </div>\n';
                    html += '                    <a href="' + escapeHtml(p.link) + '" target="_blank">Shop Now</a>\n';
                } else {
                    html += '                    <span class="tag' + tagClass + '">' + escapeHtml(p.tag) + '</span>\n';
                    html += '                    <h3>' + escapeHtml(p.name) + '</h3>\n';
                    if (style !== 'compact') html += '                    <p>' + escapeHtml(p.description) + '</p>\n';
                    html += '                    <a href="' + escapeHtml(p.link) + '" target="_blank">' + (style === 'compact' ? 'Buy' : 'Shop Now') + '</a>\n';
                }
                html += '                </div>\n';
                html += '            </div>\n';
            }
            return html;
        }

        function generateHTML() {
            var title = document.getElementById('cardTitle').value;
            var subtitle = document.getElementById('cardSubtitle').value;
            var intro = document.getElementById('cardIntro').value;
            var footer = document.getElementById('cardFooter').value;
            var style = styleSelectEl.value;
            var color = colorSelectEl.value;
            
            var css = getStyleCSS(style, color);
            var productsHtml = getProductsHTML(style, color);
            
            // 格式化输出的HTML代码，带缩进和换行
            var html = '';
            html += '<!DOCTYPE html>\n';
            html += '<html lang="en">\n';
            html += '<head>\n';
            html += '    <meta charset="UTF-8">\n';
            html += '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
            html += '    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">\n';
            html += '    <title>' + escapeHtml(title) + ' - IMVU VIP Offer</title>\n';
            html += '    <style>\n';
            html += '        ' + css.replace(/\}/g, '}\n        ').replace(/\n        \n/g, '\n').trim() + '\n';
            html += '    </style>\n';
            html += '</head>\n';
            html += '<body>\n';
            html += '<div class="container">\n';
            html += '    <div class="header">\n';
            html += '        <div class="badge">&#11088; Exclusive VIP Offer</div>\n';

            html += '    </div>\n';
            html += '    <div class="content">\n';

            html += '        <div class="products">\n';

            html += '        </div>\n';
            html += '    </div>\n';
            html += '    <div class="footer">' + escapeHtml(footer) + '</div>\n';

            html += '</body>\n';
            html += '</html>';
            
            return html;

        // HTML转义函数，防止XSS
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyCode() {
            var code = generateHTML();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(function() {
                    alert('✅ ' + t('nav.promoTool.codeCopied'));
                }).catch(function() {
                    fallbackCopy(code);
                });
            } else {
                fallbackCopy(code);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert('✅ ' + t('nav.promoTool.codeCopied'));
            } catch (err) {
                alert('❌ ' + t('nav.promoTool.copyFailed'));
            }
            document.body.removeChild(textarea);
        }

        function downloadHTML() {
            var code = generateHTML();
            var blob = new Blob([code], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'promo_card.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 保存数据到 localStorage
        function saveData() {
            var data = {
                cardTitle: document.getElementById('cardTitle').value,
                cardSubtitle: document.getElementById('cardSubtitle').value,
                cardIntro: document.getElementById('cardIntro').value,
                cardFooter: document.getElementById('cardFooter').value,
                style: styleSelectEl.value,

                products: products
            };
            localStorage.setItem('promoCardData', JSON.stringify(data));
            showSaveStatus(t('nav.promoTool.saveSuccess'));
        }

        // 从 localStorage 加载数据
        function loadData() {
            var saved = localStorage.getItem('promoCardData');
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    document.getElementById('cardTitle').value = data.cardTitle || '';
                    document.getElementById('cardSubtitle').value = data.cardSubtitle || '';
                    document.getElementById('cardIntro').value = data.cardIntro || '';
                    document.getElementById('cardFooter').value = data.cardFooter || '';
                    styleSelectEl.value = data.style || 'grid';
                    colorSelectEl.value = data.color || 'purple';
                    if (data.products && data.products.length > 0) {
                        products = data.products;
                    }
                    return true;
                } catch (e) {
                    console.error('Failed to load saved data:', e);
                }
            }
            return false;
        }

        // 清除保存的数据
        function clearSavedData() {
            if (confirm(t('nav.promoTool.confirmReset'))) {
                localStorage.removeItem('promoCardData');
                showSaveStatus(t('nav.promoTool.clearSuccess'));
            }
        }

        function showSaveStatus(msg) {

                statusEl.style.display = 'none';

        function exportImage() {
            var previewEl = document.getElementById('previewCard');
            if (!previewEl) {
                alert('Preview not found');
                return;
            }
            
            // 显示加载提示
            var btn = document.getElementById('exportImgBtn');
            var originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Exporting...';
            btn.disabled = true;
            
            // 使用 html2canvas 截图
            html2canvas(previewEl, {
                backgroundColor: '#1e1e3f',
                scale: 2, // 2倍清晰度
                useCORS: true, // 允许跨域图片
                allowTaint: true,
                logging: false
            }).then(function(canvas) {
                // 转换为图片并下载
                var link = document.createElement('a');
                link.download = 'promo_card_' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 恢复按钮
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(function(err) {
                console.error('Export failed:', err);
                alert('Export failed. Please try again or use HTML download.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        document.getElementById('addBtn').onclick = addProduct;
        document.getElementById('getCodeBtn').onclick = copyCode;
        document.getElementById('downloadBtn').onclick = downloadHTML;
        document.getElementById('exportImgBtn').onclick = exportImage;
        document.getElementById('saveBtn').onclick = saveData;
        document.getElementById('clearSavedBtn').onclick = clearSavedData;
        document.getElementById('resetBtn').onclick = resetForm;

        // 初始化
        initLangBtns();
        applyTranslations();
        // 加载保存的数据
        if (loadData()) {
            showSaveStatus(t('nav.promoTool.dataLoaded'));
        }
        renderProductsList();
        updatePreview();
    </script>
</body>
</html>
