<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMVU 产品推广卡片生成器</title>
    <script src="/static/i18n.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 顶部导航 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.2);
            color: #a855f7;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            transform: translateX(-3px);
        }
        .lang-switch {
            display: flex;
            gap: 10px;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a5b4fc;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .lang-btn:hover, .lang-btn.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.5);
            color: white;
        }
        
        h1 { color: #a855f7; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        
        .panel {
            background: linear-gradient(145deg, #1e1e3f 0%, #252550 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .panel h2 { 
            color: #a855f7; 
            margin-bottom: 20px; 
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
        .form-row { margin-bottom: 15px; }
        .form-row label { display: block; color: #a5b4fc; margin-bottom: 8px; font-size: 13px; font-weight: 500; }
        .form-row input, .form-row textarea, .form-row select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }
        .form-row small { color: #6b7280; font-size: 11px; margin-top: 5px; display: block; }
        .btn {
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-right: 10px;
            transition: all 0.3s;
        }
        .btn-primary { 
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
        .btn-secondary { 
            background: rgba(139, 92, 246, 0.2);
            color: #a855f7;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .btn-danger { 
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 15px;
        }
        
        .product-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        }
        .product-title { color: #a855f7; font-weight: 600; font-size: 15px; }
        
        /* 预览卡片样式 */
        .card-preview {
            background: linear-gradient(145deg, #1e1e3f 0%, #252550 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        /* ========== 配色方案 ========== */
        
        /* 紫色神秘风（默认） */
        .color-purple .card-header-preview {
            background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 50%, #c026d3 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .color-purple .card-header-preview::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        .color-purple .badge-preview { background: rgba(255, 255, 255, 0.2); }
        .color-purple .card-intro-preview { color: #a5b4fc; }
        .color-purple .product-card { 
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .color-purple .product-card:hover { box-shadow: 0 15px 30px rgba(139, 92, 246, 0.2); }
        .color-purple .product-card h4 { color: white; }
        .color-purple .product-card p { color: #a5b4fc; }
        .color-purple .tag { background: linear-gradient(90deg, #f59e0b 0%, #f97316 100%); }
        .color-purple .tag.vip { background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%); }
        .color-purple .shop-btn { background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 100%); }
        .color-purple .card-footer-preview { color: #a5b4fc; }
        
        /* 金色奢华风 */
        .color-gold .card-header-preview {
            background: linear-gradient(135deg, #b8860b 0%, #ffd700 25%, #daa520 50%, #ffd700 75%, #b8860b 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .color-gold .card-header-preview::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 50%);
            animation: shimmer 2s infinite;
        }
        .color-gold .badge-preview { 
            background: linear-gradient(90deg, #1a1a1a, #2d2d2d);
            color: #ffd700;
            border: 1px solid #ffd700;
        }
        .color-gold .card-header-preview h3 { 
            color: #1a1a1a; 
            text-shadow: 0 1px 2px rgba(255,215,0,0.3);
        }
        .color-gold .card-header-preview p { color: #2d2d2d; }
        .color-gold .card-intro-preview { color: #d4af37; }
        .color-gold .product-card { 
            background: linear-gradient(145deg, rgba(218, 165, 32, 0.15) 0%, rgba(184, 134, 11, 0.1) 100%);
            border: 1px solid rgba(218, 165, 32, 0.4);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        .color-gold .product-card:hover { 
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2), 0 0 20px rgba(218, 165, 32, 0.3);
            border-color: #ffd700;
        }
        .color-gold .product-card h4 { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .color-gold .product-card p { color: #d4af37; }
        .color-gold .tag { 
            background: linear-gradient(90deg, #1a1a1a, #2d2d2d);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        .color-gold .tag.vip { 
            background: linear-gradient(90deg, #ffd700, #ffec8b);
            color: #1a1a1a;
        }
        .color-gold .shop-btn { 
            background: linear-gradient(135deg, #ffd700 0%, #daa520 50%, #ffd700 100%);
            color: #1a1a1a;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        .color-gold .card-footer-preview { 
            background: linear-gradient(90deg, rgba(26,26,26,0.8), rgba(45,45,45,0.8));
            color: #d4af37;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        /* 蓝色科技风 */
        .color-blue .card-header-preview {
            background: linear-gradient(90deg, #0ea5e9 0%, #3b82f6 50%, #6366f1 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .color-blue .card-header-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: scan 20s linear infinite;
        }
        @keyframes scan { from { background-position: 0 0; } to { background-position: 60px 60px; } }
        .color-blue .badge-preview { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.2); }
        .color-blue .card-intro-preview { color: #93c5fd; }
        .color-blue .product-card { 
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .color-blue .product-card:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }
        .color-blue .product-card h4 { color: #60a5fa; }
        .color-blue .product-card p { color: #93c5fd; }
        .color-blue .tag { background: linear-gradient(90deg, #06b6d4 0%, #0ea5e9 100%); }
        .color-blue .tag.vip { background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%); }
        .color-blue .shop-btn { background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%); }
        .color-blue .card-footer-preview { color: #93c5fd; }
        
        /* 红色热情风 */
        .color-red .card-header-preview {
            background: linear-gradient(90deg, #dc2626 0%, #ef4444 50%, #f97316 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .color-red .card-header-preview::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
        .color-red .badge-preview { background: rgba(0, 0, 0, 0.3); }
        .color-red .card-intro-preview { color: #fca5a5; }
        .color-red .product-card { 
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.1) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .color-red .product-card:hover { box-shadow: 0 0 25px rgba(239, 68, 68, 0.3); }
        .color-red .product-card h4 { color: #fca5a5; }
        .color-red .product-card p { color: #fdba74; }
        .color-red .tag { background: linear-gradient(90deg, #f97316 0%, #fbbf24 100%); }
        .color-red .tag.vip { background: linear-gradient(90deg, #dc2626 0%, #ef4444 100%); }
        .color-red .shop-btn { background: linear-gradient(90deg, #ef4444 0%, #f97316 100%); }
        .color-red .card-footer-preview { color: #fca5a5; }
        
        /* 绿色清新风 */
        .color-green .card-header-preview {
            background: linear-gradient(90deg, #059669 0%, #10b981 50%, #34d399 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .color-green .card-header-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 50%);
        }
        .color-green .badge-preview { background: rgba(0, 0, 0, 0.3); }
        .color-green .card-intro-preview { color: #6ee7b7; }
        .color-green .product-card { 
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.1) 0%, rgba(52, 211, 153, 0.05) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .color-green .product-card:hover { box-shadow: 0 0 25px rgba(16, 185, 129, 0.3); }
        .color-green .product-card h4 { color: #6ee7b7; }
        .color-green .product-card p { color: #a7f3d0; }
        .color-green .tag { background: linear-gradient(90deg, #14b8a6 0%, #2dd4bf 100%); }
        .color-green .tag.vip { background: linear-gradient(90deg, #059669 0%, #10b981 100%); }
        .color-green .shop-btn { background: linear-gradient(90deg, #10b981 0%, #34d399 100%); }
        .color-green .card-footer-preview { color: #6ee7b7; }
        
        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }
        
        .badge-preview {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            margin-bottom: 15px;
        }
        .card-header-preview h3 { 
            color: white; 
            font-size: 28px; 
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
        }
        .card-header-preview p { 
            color: rgba(255,255,255,0.9); 
            font-size: 14px;
            position: relative;
        }
        .card-body-preview { padding: 30px; }
        .card-intro-preview { 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }
        
        /* 样式1: 两列网格 */
        .style-grid .products-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .style-grid .product-card {
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .style-grid .product-card:hover {
            transform: translateY(-5px);
        }
        .style-grid .product-card .img-container {
            width: 100%;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }
        .style-grid .product-card .img-container img { width: 100px; height: 80px; object-fit: cover; border-radius: 8px; }
        .style-grid .product-card .info { padding: 15px; }
        .style-grid .product-card .tag {
            display: inline-block;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .style-grid .product-card h4 { font-size: 16px; margin-bottom: 5px; font-weight: 700; }
        .style-grid .product-card p { font-size: 12px; margin-bottom: 10px; }
        .style-grid .product-card .shop-btn {
            display: inline-block;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 样式2: 横向列表 */
        .style-list .products-container { display: block; }
        .style-list .product-card {
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
        }
        .style-list .product-card:hover {
            transform: translateX(5px);
        }
        .style-list .product-card .img-container {
            width: 100px;
            height: 80px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }
        .style-list .product-card .img-container img { width: 100px; height: 80px; object-fit: cover; border-radius: 8px; }
        .style-list .product-card .info { padding: 15px; flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .style-list .product-card .info-left { flex: 1; }
        .style-list .product-card .tag {
            display: inline-block;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .style-list .product-card h4 { font-size: 18px; margin-bottom: 3px; font-weight: 700; }
        .style-list .product-card p { font-size: 13px; }
        .style-list .product-card .shop-btn {
            display: inline-block;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        /* 样式3: 大卡片 */
        .style-card .products-container { display: block; }
        .style-card .product-card {
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .style-card .product-card:hover {
            transform: translateY(-5px);
        }
        .style-card .product-card .img-container {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }
        .style-card .product-card .img-container img { width: 150px; height: 120px; object-fit: cover; border-radius: 10px; }
        .style-card .product-card .info { padding: 20px; text-align: center; }
        .style-card .product-card .tag {
            display: inline-block;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .style-card .product-card h4 { font-size: 22px; margin-bottom: 8px; font-weight: 700; }
        .style-card .product-card p { font-size: 14px; margin-bottom: 15px; }
        .style-card .product-card .shop-btn {
            display: inline-block;
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        
        /* 样式4: 紧凑三列 */
        .style-compact .products-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .style-compact .product-card {
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .style-compact .product-card:hover {
            transform: scale(1.03);
        }
        .style-compact .product-card .img-container {
            width: 100%;
            text-align: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        .style-compact .product-card .img-container img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; }
        .style-compact .product-card .info { padding: 10px; text-align: center; }
        .style-compact .product-card .tag {
            display: inline-block;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .style-compact .product-card h4 { font-size: 13px; margin-bottom: 3px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .style-compact .product-card p { display: none; }
        .style-compact .product-card .shop-btn {
            display: inline-block;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
        }
        
        /* 样式5: 精品展示 */
        .style-featured .products-container { display: block; }
        .style-featured .product-card {
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }
        .style-featured .product-card:hover {
            transform: scale(1.02);
        }
        .style-featured .product-card .img-container {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }
        .style-featured .product-card .img-container img { width: 180px; height: 140px; object-fit: cover; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .style-featured .product-card .info { padding: 25px; text-align: center; }
        .style-featured .product-card .tag {
            display: inline-block;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;

        // 多语言支持
        function switchLang(lang) {
            if (typeof setLanguage === 'function') {
                setLanguage(lang);
            } else {
                localStorage.setItem('imvu_lang', lang);
                location.reload();
            }
        }
        
        // 初始化语言按钮状态
        function initLangBtns() {
            var currentLang = localStorage.getItem('imvu_lang') || 'en';
            var btns = document.querySelectorAll('.lang-btn');
            btns.forEach(function(btn) {
                if (btn.textContent === 'EN' && currentLang === 'en') {
                    btn.classList.add('active');
                } else if (btn.textContent === '中文' && currentLang === 'zh') {
                    btn.classList.add('active');
                }
            });
        }
        
        // 翻译函数
        function t(key) {
            if (typeof getTranslation === 'function') {
                return getTranslation(key);
            }
            var keys = key.split('.');
            var result = translations[currentLang] || translations['en'];
            for (var i = 0; i < keys.length; i++) {
                result = result[keys[i]];
                if (!result) break;
            }
            return result || key;
        }
        
        // 应用翻译
        function applyTranslations() {
            var elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                var text = t(key);
                if (text) el.textContent = text;
            });
        }

            var btnCSS = 'background:' + c.btn + ';color:' + c.btnText + ';' + (isGold ? 'font-weight:700;box-shadow:0 4px 15px ' + c.btnShadow + ';' : '');
            
            if (style === 'grid') {
                return baseCSS + '.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}.product{background:' + c.cardBg + ';border:1px solid ' + c.cardBorder + ';border-radius:15px;overflow:hidden;transition:all 0.3s;}.product:hover{transform:translateY(-5px);box-shadow:0 15px 30px ' + c.cardShadow + ';}.product .img{text-align:center;padding:10px;background:rgba(0,0,0,0.2);}.product img{width:100px;height:80px;border-radius:8px;object-fit:cover;}.product .info{padding:15px;}.product .tag{display:inline-block;' + tagNormalCSS + 'padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;margin-bottom:8px;}.product .tag.vip{' + tagVipCSS + '}.product h3{color:' + c.title + ';' + (isGold ? 'text-shadow:' + c.titleShadow + ';' : '') + 'font-size:16px;margin-bottom:5px;font-weight:700;}.product p{color:' + c.desc + ';font-size:12px;margin-bottom:10px;}.product a{display:inline-block;' + btnCSS + 'padding:8px 20px;border-radius:20px;text-decoration:none;font-size:12px;font-weight:600;}@media(max-width:500px){.products{grid-template-columns:1fr;}}';
            } else if (style === 'list') {
                return baseCSS + '.products{display:block;}.product{background:' + c.cardBg + ';border:1px solid ' + c.cardBorder + ';border-radius:15px;margin-bottom:15px;overflow:hidden;display:flex;transition:all 0.3s;}.product:hover{transform:translateX(5px);box-shadow:0 10px 25px ' + c.cardShadow + ';}.product .img{width:100px;height:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);}.product img{width:100px;height:80px;border-radius:8px;object-fit:cover;}.product .info{padding:15px;flex:1;display:flex;align-items:center;justify-content:space-between;gap:15px;}.product .info-left{flex:1;}.product .tag{display:inline-block;' + tagNormalCSS + 'padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:5px;}.product .tag.vip{' + tagVipCSS + '}.product h3{color:' + c.title + ';' + (isGold ? 'text-shadow:' + c.titleShadow + ';' : '') + 'font-size:18px;margin-bottom:3px;font-weight:700;}.product p{color:' + c.desc + ';font-size:13px;}.product a{display:inline-block;' + btnCSS + 'padding:10px 25px;border-radius:25px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;}';
            } else if (style === 'card') {
                return baseCSS + '.products{display:block;}.product{background:' + c.cardBg + ';border:1px solid ' + c.cardBorder + ';border-radius:15px;margin-bottom:20px;overflow:hidden;transition:all 0.3s;}.product:hover{transform:translateY(-5px);box-shadow:0 20px 40px ' + c.cardShadow + ';}.product .img{width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);}.product img{width:150px;height:120px;border-radius:10px;object-fit:cover;}.product .info{padding:20px;text-align:center;}.product .tag{display:inline-block;' + tagNormalCSS + 'padding:6px 15px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:10px;}.product .tag.vip{' + tagVipCSS + '}.product h3{color:' + c.title + ';' + (isGold ? 'text-shadow:' + c.titleShadow + ';' : '') + 'font-size:22px;margin-bottom:8px;font-weight:700;}.product p{color:' + c.desc + ';font-size:14px;margin-bottom:15px;}.product a{display:inline-block;' + btnCSS + 'padding:12px 35px;border-radius:25px;text-decoration:none;font-size:14px;font-weight:600;}';
            } else if (style === 'compact') {
                return baseCSS + '.products{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}.product{background:' + c.cardBg + ';border:1px solid ' + c.cardBorder + ';border-radius:10px;overflow:hidden;transition:all 0.3s;}.product:hover{transform:scale(1.03);box-shadow:0 10px 20px ' + c.cardShadow + ';}.product .img{text-align:center;padding:8px;background:rgba(0,0,0,0.2);}.product img{width:80px;height:60px;border-radius:6px;object-fit:cover;}.product .info{padding:10px;text-align:center;}.product .tag{display:inline-block;' + tagNormalCSS + 'padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;text-transform:uppercase;margin-bottom:5px;}.product .tag.vip{' + tagVipCSS + '}.product h3{color:' + c.title + ';' + (isGold ? 'text-shadow:' + c.titleShadow + ';' : '') + 'font-size:13px;margin-bottom:3px;font-weight:600;}.product a{display:inline-block;' + btnCSS + 'padding:5px 12px;border-radius:15px;text-decoration:none;font-size:10px;font-weight:600;}@media(max-width:500px){.products{grid-template-columns:repeat(2,1fr);}}';
            } else if (style === 'featured') {
                return baseCSS + '.products{display:block;}.product{background:' + c.cardBg + ';border:2px solid ' + c.cardBorder + ';border-radius:20px;margin-bottom:20px;overflow:hidden;transition:all 0.3s;}.product:hover{transform:scale(1.02);box-shadow:0 0 30px ' + c.cardShadow + ';}.product .img{width:100%;height:150px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);}.product img{width:180px;height:140px;border-radius:12px;object-fit:cover;box-shadow:0 5px 20px rgba(0,0,0,0.3);}.product .info{padding:25px;text-align:center;}.product .tag{display:inline-block;' + tagNormalCSS + 'padding:8px 20px;border-radius:25px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}.product .tag.vip{' + tagVipCSS + '}.product h3{color:' + c.title + ';' + (isGold ? 'text-shadow:' + c.titleShadow + ';' : '') + 'font-size:26px;margin-bottom:10px;font-weight:700;}.product p{color:' + c.desc + ';font-size:15px;margin-bottom:20px;line-height:1.5;}.product a{display:inline-block;' + btnCSS + 'padding:15px 45px;border-radius:30px;text-decoration:none;font-size:16px;font-weight:700;}';
            }
        }

        function getProductsHTML(style, color) {
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var tagClass = p.tagType === 'vip' ? ' vip' : '';
                html += '<div class="product">';
                html += '<div class="img"><img src="' + p.image + '" alt="' + p.name + '"></div>';
                html += '<div class="info">';
                if (style === 'list') {
                    html += '<div class="info-left"><span class="tag' + tagClass + '">' + p.tag + '</span><h3>' + p.name + '</h3><p>' + p.description + '</p></div>';
                    html += '<a href="' + p.link + '" target="_blank">Shop Now →</a>';
                } else {
                    html += '<span class="tag' + tagClass + '">' + p.tag + '</span>';
                    html += '<h3>' + p.name + '</h3>';
                    if (style !== 'compact') html += '<p>' + p.description + '</p>';
                    html += '<a href="' + p.link + '" target="_blank">' + (style === 'compact' ? 'Buy' : 'Shop Now →') + '</a>';
                }
                html += '</div></div>\n';
            }
            return html;
        }

        function generateHTML() {
            var title = document.getElementById('cardTitle').value;
            var subtitle = document.getElementById('cardSubtitle').value;
            var intro = document.getElementById('cardIntro').value;
            var footer = document.getElementById('cardFooter').value;
            var style = styleSelectEl.value;
            var color = colorSelectEl.value;
            
            var css = getStyleCSS(style, color);
            var productsHtml = getProductsHTML(style, color);
            
            return '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>' + title + ' - VIP Offer</title>\n<style>\n' + css + '\n</style>\n</head>\n<body>\n<div class="container">\n<div class="header">\n<div class="badge">🌟 Exclusive VIP Offer</div>\n<h1>' + title + '</h1>\n<p>' + subtitle + '</p>\n</div>\n<div class="content">\n<p class="intro">' + intro + '</p>\n<div class="products">\n' + productsHtml + '</div>\n</div>\n<div class="footer">' + footer + '</div>\n</div>\n</body>\n</html>';
        }

        function copyCode() {
            var code = generateHTML();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(function() {
                    alert('✅ ' + t('nav.promoTool.codeCopied'));
                }).catch(function() {
                    fallbackCopy(code);
                });
            } else {
                fallbackCopy(code);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert('✅ ' + t('nav.promoTool.codeCopied'));
            } catch (err) {
                alert('❌ ' + t('nav.promoTool.copyFailed'));
            }
            document.body.removeChild(textarea);
        }

        function downloadHTML() {
            var code = generateHTML();
            var blob = new Blob([code], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'promo_card.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetForm() {
            if (confirm(t('nav.promoTool.confirmReset'))) {
                document.getElementById('cardTitle').value = 'Upgrade Your Experience';
                document.getElementById('cardSubtitle').value = 'Premium IMVU Collections';
                document.getElementById('cardIntro').value = 'Discover our premium multi-avatar collections. Crafted for the elite.';
                document.getElementById('cardFooter').value = 'Click to view High-Res previews and secure your copy before the price update.';
                products = [
                    { tag: 'Top Seller AP', tagType: 'normal', name: 'Spread Cheeks', description: 'The #1 rated realistic animation.', image: 'https://userimages01-akm.imvu.com/productdata/images_467847cdc3306eee569ff29bb5b46493.gif', link: 'https://www.imvu.com/shop/product.php?products_id=1' }
                ];
                renderProductsList();
                updatePreview();
            }
        }

        document.getElementById('addBtn').onclick = addProduct;
        document.getElementById('getCodeBtn').onclick = copyCode;
        document.getElementById('downloadBtn').onclick = downloadHTML;
        document.getElementById('resetBtn').onclick = resetForm;

        // 初始化
        initLangBtns();
        applyTranslations();
        renderProductsList();
        updatePreview();
    </script>
</body>
</html>
