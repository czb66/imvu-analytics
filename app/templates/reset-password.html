<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="reset_password_title">重置密码 - IMVU Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            color: white;
            width: 100%;
        }
        .btn-submit:hover {
            opacity: 0.9;
            color: white;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
        }
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .password-match {
            font-size: 12px;
            color: #28a745;
        }
        .password-mismatch {
            font-size: 12px;
            color: #dc3545;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrapper i {
            font-size: 36px;
            color: white;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .lang-switch button:hover {
            background: rgba(255,255,255,0.3);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button onclick="switchLanguage('en')">English</button>
        <button onclick="switchLanguage('zh')">中文</button>
    </div>
    
    <div class="container-wrapper">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 data-i18n="reset_password">重置密码</h1>
                <p id="emailHint" data-i18n="enter_new_password">请输入您的新密码</p>
            </div>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
            <div id="successBox" class="alert alert-success d-none" role="alert"></div>
            
            <div id="loadingState" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2" data-i18n="validating_token">正在验证链接...</p>
            </div>
            
            <form id="resetForm" class="hidden">
                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="newPassword" placeholder="New Password" required minlength="8">
                    <label for="newPassword" data-i18n="new_password">新密码</label>
                    <span class="password-toggle" onclick="togglePassword('newPassword')">
                        <i class="bi bi-eye" id="eyeIcon1"></i>
                    </span>
                </div>
                
                <p class="password-requirements" data-i18n="password_hint">密码至少8个字符</p>
                
                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required minlength="8">
                    <label for="confirmPassword" data-i18n="confirm_password">确认密码</label>
                    <span class="password-toggle" onclick="togglePassword('confirmPassword')">
                        <i class="bi bi-eye" id="eyeIcon2"></i>
                    </span>
                </div>
                
                <p id="passwordMatchHint" class="password-match d-none" data-i18n="passwords_match">两次输入的密码一致</p>
                <p id="passwordMismatchHint" class="password-mismatch d-none" data-i18n="passwords_mismatch">两次输入的密码不一致</p>
                
                <button type="submit" class="btn btn-submit btn-lg" id="submitBtn">
                    <span data-i18n="reset_password_btn">重置密码</span>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/login" data-i18n="back_to_login">返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 多语言支持
        const translations = {
            en: {
                reset_password_title: 'Reset Password - IMVU Analytics',
                reset_password: 'Reset Password',
                enter_new_password: 'Please enter your new password',
                new_password: 'New Password',
                confirm_password: 'Confirm Password',
                passwords_match: 'Passwords match',
                passwords_mismatch: 'Passwords do not match',
                password_hint: 'Password must be at least 8 characters',
                reset_password_btn: 'Reset Password',
                back_to_login: 'Back to Login',
                validating_token: 'Validating link...',
                password_required: 'Password is required',
                password_too_short: 'Password must be at least 8 characters',
                passwords_not_match: 'Passwords do not match',
                reset_success: 'Password reset successfully! Redirecting to login...',
                reset_error: 'Failed to reset password. The link may have expired.',
                invalid_token: 'Invalid or expired reset link'
            },
            zh: {
                reset_password_title: '重置密码 - IMVU Analytics',
                reset_password: '重置密码',
                enter_new_password: '请输入您的新密码',
                new_password: '新密码',
                confirm_password: '确认密码',
                passwords_match: '两次输入的密码一致',
                passwords_mismatch: '两次输入的密码不一致',
                password_hint: '密码至少8个字符',
                reset_password_btn: '重置密码',
                back_to_login: '返回登录',
                validating_token: '正在验证链接...',
                password_required: '请输入密码',
                password_too_short: '密码长度至少8位',
                passwords_not_match: '两次输入的密码不一致',
                reset_success: '密码重置成功！正在跳转至登录页面...',
                reset_error: '密码重置失败，链接可能已过期。',
                invalid_token: '重置链接无效或已过期'
            }
        };

        let currentLang = 'zh';
        let resetToken = '';

        function switchLanguage(lang) {
            currentLang = lang;
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        }

        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            const successBox = document.getElementById('successBox');
            
            alertBox.classList.add('d-none');
            successBox.classList.add('d-none');
            
            if (isSuccess) {
                successBox.textContent = message;
                successBox.classList.remove('d-none');
            } else {
                alertBox.textContent = message;
                alertBox.classList.remove('d-none');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = inputId === 'newPassword' ? 
                document.getElementById('eyeIcon1') : 
                document.getElementById('eyeIcon2');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchHint = document.getElementById('passwordMatchHint');
            const mismatchHint = document.getElementById('passwordMismatchHint');
            
            if (confirmPassword.length === 0) {
                matchHint.classList.add('d-none');
                mismatchHint.classList.add('d-none');
                return;
            }
            
            if (newPassword === confirmPassword) {
                matchHint.classList.remove('d-none');
                mismatchHint.classList.add('d-none');
            } else {
                matchHint.classList.add('d-none');
                mismatchHint.classList.remove('d-none');
            }
        }

        // 获取URL参数中的token
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }

        // 验证token
        async function validateToken() {
            resetToken = getTokenFromUrl();
            
            if (!resetToken) {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resetForm').classList.add('hidden');
                showAlert(translations[currentLang].invalid_token);
                return;
            }
            
            try {
                const response = await fetch('/api/auth/validate-reset-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: resetToken })
                });
                
                const data = await response.json();
                
                document.getElementById('loadingState').classList.add('hidden');
                
                if (data.success) {
                    document.getElementById('resetForm').classList.remove('hidden');
                    if (data.data && data.data.email) {
                        document.getElementById('emailHint').textContent = 
                            `${translations[currentLang].enter_new_password} (${data.data.email})`;
                    }
                } else {
                    document.getElementById('resetForm').classList.add('hidden');
                    showAlert(data.message || translations[currentLang].invalid_token);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resetForm').classList.add('hidden');
                showAlert(translations[currentLang].invalid_token);
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证密码
            if (!newPassword) {
                showAlert(translations[currentLang].password_required);
                return;
            }
            
            if (newPassword.length < 8) {
                showAlert(translations[currentLang].password_too_short);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showAlert(translations[currentLang].passwords_not_match);
                return;
            }
            
            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>${translations[currentLang].validating_token}`;
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: resetToken,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(translations[currentLang].reset_success, true);
                    document.getElementById('resetForm').reset();
                    
                    // 3秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showAlert(data.message || translations[currentLang].reset_error);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(translations[currentLang].reset_error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = translations[currentLang].reset_password_btn;
            }
        });

        // 密码匹配检查
        document.getElementById('newPassword').addEventListener('input', checkPasswordMatch);
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        // 页面加载时验证token
        window.addEventListener('DOMContentLoaded', validateToken);
        switchLanguage(currentLang);
    </script>
</body>
</html>
