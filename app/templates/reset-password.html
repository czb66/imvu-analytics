<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page_title %}{{ page_title }}{% else %}重置密码 - IMVU Analytics{% endif %}</title>
    <meta name="description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}">
    <meta name="keywords" content="{% if meta_keywords %}{{ meta_keywords }}{% else %}IMVU,数据分析,营销,销售报告{% endif %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{% if canonical_url %}{{ canonical_url }}{% else %}https://imvucreators.com{% endif %}">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page_title %}{{ page_title }}{% else %}重置密码 - IMVU Analytics{% endif %}">
    <meta property="og:description" content="{% if meta_description %}{{ meta_description }}{% else %}IMVU营销数据分析平台{% endif %}">
    <meta property="og:url" content="{% if canonical_url %}{{ canonical_url }}{% else %}https://imvucreators.com{% endif %}">
    <meta property="og:site_name" content="IMVU Analytics">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/auth.js"></script>
    <script src="/static/i18n.js?v=20260428"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #6366f1;
            --dark: #0f172a;
            --darker: #1e293b;
        }
        body {
            background: #f1f5f9 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #3b82f6;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-floating .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #ffffff;
        }
        .btn-submit {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            color: white;
            width: 100%;
        }
        .btn-submit:hover {
            opacity: 0.9;
            color: white;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
        }
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .password-match {
            font-size: 12px;
            color: #28a745;
        }
        .password-mismatch {
            font-size: 12px;
            color: #dc3545;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrapper i {
            font-size: 36px;
            color: white;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="lang-select-wrapper">
        <select id="langSelect" class="lang-select" onchange="setLanguage(this.value)">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="fr">Français</option>
        </select>
    </div>
    
    <div class="container-wrapper">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 data-i18n="resetPassword.title">重置密码</h1>
                <p id="emailHint" data-i18n="resetPassword.enterNewPassword">请输入您的新密码</p>
            </div>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
            <div id="successBox" class="alert alert-success d-none" role="alert"></div>
            
            <div id="loadingState" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2" data-i18n="resetPassword.validatingToken">正在验证链接...</p>
            </div>
            
            <form id="resetForm" class="hidden">
                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="newPassword" placeholder="New Password" required minlength="8">
                    <label for="newPassword" data-i18n="resetPassword.newPassword">新密码</label>
                    <span class="password-toggle" onclick="togglePassword('newPassword')">
                        <i class="bi bi-eye" id="eyeIcon1"></i>
                    </span>
                </div>
                
                <p class="password-requirements" data-i18n="resetPassword.passwordHint">密码至少8个字符</p>
                
                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required minlength="8">
                    <label for="confirmPassword" data-i18n="resetPassword.confirmPassword">确认密码</label>
                    <span class="password-toggle" onclick="togglePassword('confirmPassword')">
                        <i class="bi bi-eye" id="eyeIcon2"></i>
                    </span>
                </div>
                
                <p id="passwordMatchHint" class="password-match d-none" data-i18n="resetPassword.passwordsMatch">两次输入的密码一致</p>
                <p id="passwordMismatchHint" class="password-mismatch d-none" data-i18n="resetPassword.passwordsMismatch">两次输入的密码不一致</p>
                
                <button type="submit" class="btn btn-submit btn-lg" id="submitBtn">
                    <span data-i18n="resetPassword.resetBtn">重置密码</span>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/login" data-i18n="resetPassword.backToLogin">返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let resetToken = '';

        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            const successBox = document.getElementById('successBox');
            
            alertBox.classList.add('d-none');
            successBox.classList.add('d-none');
            
            if (isSuccess) {
                successBox.textContent = message;
                successBox.classList.remove('d-none');
            } else {
                alertBox.textContent = message;
                alertBox.classList.remove('d-none');
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = inputId === 'newPassword' ? 
                document.getElementById('eyeIcon1') : 
                document.getElementById('eyeIcon2');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchHint = document.getElementById('passwordMatchHint');
            const mismatchHint = document.getElementById('passwordMismatchHint');
            
            if (confirmPassword.length === 0) {
                matchHint.classList.add('d-none');
                mismatchHint.classList.add('d-none');
                return;
            }
            
            if (newPassword === confirmPassword) {
                matchHint.classList.remove('d-none');
                mismatchHint.classList.add('d-none');
            } else {
                matchHint.classList.add('d-none');
                mismatchHint.classList.remove('d-none');
            }
        }

        // 获取URL参数中的token
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }

        // 验证token
        async function validateToken() {
            resetToken = getTokenFromUrl();
            const currentLang = getCurrentLanguage();
            
            if (!resetToken) {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resetForm').classList.add('hidden');
                showAlert(t('resetPassword.invalidToken'));
                return;
            }
            
            try {
                const response = await fetch('/api/auth/validate-reset-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: resetToken })
                });
                
                const data = await response.json();
                
                document.getElementById('loadingState').classList.add('hidden');
                
                if (data.success) {
                    document.getElementById('resetForm').classList.remove('hidden');
                    if (data.data && data.data.email) {
                        const emailHint = document.getElementById('emailHint');
                        emailHint.textContent = `${t('resetPassword.enterNewPassword')} (${data.data.email})`;
                    }
                } else {
                    document.getElementById('resetForm').classList.add('hidden');
                    showAlert(data.message || t('resetPassword.invalidToken'));
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resetForm').classList.add('hidden');
                showAlert(t('resetPassword.invalidToken'));
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证密码
            if (!newPassword) {
                showAlert(t('resetPassword.passwordRequired'));
                return;
            }
            
            if (newPassword.length < 8) {
                showAlert(t('resetPassword.passwordTooShort'));
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showAlert(t('resetPassword.passwordsNotMatch'));
                return;
            }
            
            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + t('resetPassword.validatingToken');
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: resetToken,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(t('resetPassword.resetSuccess'), true);
                    document.getElementById('resetForm').reset();
                    
                    // 3秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showAlert(data.message || t('resetPassword.resetError'));
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(t('resetPassword.resetError'));
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span data-i18n="resetPassword.resetBtn">' + t('resetPassword.resetBtn') + '</span>';
            }
        });

        // 密码匹配检查
        document.getElementById('newPassword').addEventListener('input', checkPasswordMatch);
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        // 页面加载时验证token
        window.addEventListener('DOMContentLoaded', validateToken);
    </script>
</body>
</html>
