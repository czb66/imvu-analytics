<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">登录 - IMVU Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            color: white;
            width: 100%;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .remember-me input {
            margin-right: 8px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
        }
        .password-wrapper {
            position: relative;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .lang-switch button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button onclick="switchLanguage('en')">English</button>
        <button onclick="switchLanguage('zh')">中文</button>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="bi bi-graph-up"></i> IMVU Analytics</h1>
                <p data-i18n="login_subtitle">营销数据分析平台</p>
            </div>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
            
            <form id="loginForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email" data-i18n="email">邮箱</label>
                </div>
                
                <div class="form-floating password-wrapper">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <label for="password" data-i18n="password">密码</label>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" data-i18n="remember_me">记住我</label>
                </div>
                
                <button type="submit" class="btn btn-login btn-lg" id="submitBtn">
                    <span data-i18n="login_btn">登录</span>
                </button>
            </form>
            
            <div class="register-link">
                <span data-i18n="no_account">还没有账号？</span>
                <a href="/register" data-i18n="register_now">立即注册</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 多语言支持
        const translations = {
            en: {
                login_title: 'Login - IMVU Analytics',
                login_subtitle: 'Marketing Analytics Platform',
                email: 'Email',
                password: 'Password',
                remember_me: 'Remember me',
                login_btn: 'Login',
                no_account: "Don't have an account?",
                register_now: 'Register now',
                login_success: 'Login successful! Redirecting...',
                login_error: 'Login failed. Please check your credentials.',
                invalid_email: 'Please enter a valid email address',
                password_required: 'Password is required'
            },
            zh: {
                login_title: '登录 - IMVU Analytics',
                login_subtitle: '营销数据分析平台',
                email: '邮箱',
                password: '密码',
                remember_me: '记住我',
                login_btn: '登录',
                no_account: '还没有账号？',
                register_now: '立即注册',
                login_success: '登录成功！正在跳转...',
                login_error: '登录失败，请检查邮箱和密码。',
                invalid_email: '请输入有效的邮箱地址',
                password_required: '请输入密码'
            }
        };

        let currentLang = localStorage.getItem('language') || 'zh';

        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        // 初始化语言
        switchLanguage(currentLang);

        // 切换密码可见性
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            }
        }

        // 显示提示
        function showAlert(message, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.classList.remove('d-none', 'alert-danger', 'alert-success');
            alertBox.classList.add(isSuccess ? 'alert-success' : 'alert-danger');
            
            setTimeout(() => {
                alertBox.classList.add('d-none');
            }, 5000);
        }

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证
            if (!email || !password) {
                showAlert(currentLang === 'zh' ? '请填写所有字段' : 'Please fill in all fields');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + 
                (currentLang === 'zh' ? '登录中...' : 'Logging in...');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        remember_me: rememberMe
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存Token到localStorage
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    showAlert(translations[currentLang].login_success, true);
                    
                    // 跳转到仪表盘
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.message || translations[currentLang].login_error);
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert(translations[currentLang].login_error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span data-i18n="login_btn">' + translations[currentLang].login_btn + '</span>';
            }
        });

        // 检查是否已登录
        const token = localStorage.getItem('access_token');
        if (token) {
            // 验证token是否有效
            fetch('/api/auth/me', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    // 已登录，跳转到仪表盘
                    window.location.href = '/dashboard';
                }
            }).catch(() => {
                // token无效，删除
                localStorage.removeItem('access_token');
                localStorage.removeItem('user');
            });
        }
    </script>
</body>
</html>
