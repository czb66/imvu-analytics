[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway 变量
[railway]
# 需要创建 /app 目录
startCommand = "mkdir -p data reports && uvicorn app.main:app --host 0.0.0.0 --port 8000"
